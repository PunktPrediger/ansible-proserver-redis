---
redis:
  prefix:
    config: >-
      {%- if ansible_facts['system'] == 'Linux' -%}
        /etc/redis
      {%- else -%}
        /usr/local/etc
      {%- endif -%}
  service:
    server: >-
      {%- if ansible_facts['system'] == 'Linux' -%}
        redis-server
      {%- else -%}
        redis
      {%- endif -%}
    sentinel: redis-sentinel
  redis.conf: {}
  sentinel.conf: {}
  replication:
    sentinel: no
  repository:
    apt:
      key_url:
      repository:
